<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathQuest - Platform Olimpiade Matematika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .soft-gradient { background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); }
        .nav-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 nav-blur border-b border-slate-200 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="bg-blue-600 text-white p-2 rounded-lg"><i class="fas fa-infinity"></i></div>
            <span class="font-bold text-xl tracking-tight text-slate-800">MathQuest</span>
        </div>
        <div class="hidden md:flex space-x-6 text-sm font-medium">
            <a href="#" class="text-blue-600">Home</a>
            <a href="#materi" class="hover:text-blue-500 transition">Materi</a>
            <a href="#soal" class="hover:text-blue-500 transition">Bank Soal</a>
            <a href="#ranking" class="hover:text-blue-500 transition">Ranking</a>
        </div>
        <div id="auth-section" class="flex items-center gap-4">
            <button onclick="toggleModal('login-modal')" class="text-sm font-semibold">Masuk</button>
            <button onclick="toggleModal('login-modal')" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-semibold hover:shadow-lg transition">Daftar</button>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6 soft-gradient">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-12">
            <div class="flex-1">
                <h1 class="text-4xl md:text-6xl font-bold text-slate-800 leading-tight">Raih Poin, Koleksi <span class="text-blue-600">Lencana Emas.</span></h1>
                <p class="mt-6 text-slate-600 text-lg">Pusat materi OSN & IMO terlengkap. Belajar bertahap dari pemula hingga master.</p>
                <div class="mt-8 flex gap-4">
                    <a href="#materi" class="bg-slate-800 text-white px-8 py-3 rounded-xl hover:bg-slate-700 transition">Mulai Belajar</a>
                    <a href="#ranking" class="border border-slate-300 px-8 py-3 rounded-xl hover:bg-white transition text-slate-600">Lihat Leaderboard</a>
                </div>
            </div>
            <div id="user-status-card" class="flex-1 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-2xl text-blue-600">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-xl" id="display-name">Siswa Tamu</h3>
                        <p class="text-slate-400 text-sm">Level 1: Novice</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <span class="block text-slate-400 text-xs uppercase font-bold">Total Poin</span>
                        <span class="text-2xl font-bold text-blue-600" id="user-points">0</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <span class="block text-slate-400 text-xs uppercase font-bold">Lencana</span>
                        <span class="text-2xl font-bold text-yellow-500" id="user-badges">0</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="login-modal" class="modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md relative shadow-2xl">
            <button onclick="toggleModal('login-modal')" class="absolute top-4 right-4 text-slate-400"><i class="fas fa-times"></i></button>
            <h2 class="text-2xl font-bold mb-6 text-center">Masuk ke MathQuest</h2>
            <input type="text" id="input-name" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-100 rounded-xl mb-4 border-none focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition">Mulai Belajar Sekarang</button>
        </div>
    </div>

    <script>
        // Data sederhana (bisa diganti dengan Supabase nantinya)
        let user = {
            name: "Guest",
            points: 0,
            badges: 0,
            loggedIn: false
        };

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function handleLogin() {
            const nameInput = document.getElementById('input-name').value;
            if (nameInput.trim() !== "") {
                user.name = nameInput;
                user.loggedIn = true;
                updateUI();
                toggleModal('login-modal');
                alert("Selamat datang, " + user.name + "! Selesaikan materi untuk poin.");
            }
        }

        function updateUI() {
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('user-points').innerText = user.points;
            document.getElementById('user-badges').innerText = user.badges;
            
            if(user.loggedIn) {
                document.getElementById('auth-section').innerHTML = `
                    <span class="text-sm font-bold text-blue-600">Halo, ${user.name.split(' ')[0]}!</span>
                    <button onclick="logout()" class="text-xs text-red-500 underline">Logout</button>
                `;
            }
        }

        function logout() {
            location.reload(); // Reset sederhana
        }

        // Fungsi Simulasi Kerjakan Soal (Bisa dipanggil di tombol materi)
        function tambahPoin(jumlah) {
            if(!user.loggedIn) {
                toggleModal('login-modal');
                return;
            }
            user.points += jumlah;
            if(user.points >= 100 && user.badges == 0) {
                user.badges += 1;
                alert("🏆 Selamat! Kamu mendapatkan Lencana Perunggu pertama!");
            }
            updateUI();
        }
    </script>
</body>
</html>
